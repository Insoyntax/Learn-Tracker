version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - Tailwind CSS 4
  - Framer Motion
  - Lucide React Icons
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Main dashboard page with bento grid layout showing streak, roadmap, recent log, and quick note widgets
  - path: /roadmaps
    file: N/A
    auth_required: false
    description: Roadmaps page (linked in sidebar, not yet implemented)
  - path: /resources
    file: N/A
    auth_required: false
    description: Resources page (linked in sidebar, not yet implemented)
  - path: /logs
    file: N/A
    auth_required: false
    description: Study Logs page (linked in sidebar, not yet implemented)
features:
  - name: Dashboard Bento Grid
    description: Main dashboard displays a responsive bento grid layout with animated widgets using Framer Motion stagger animations
    files:
      - src/app/page.tsx
      - src/components/dashboard/BentoGrid.tsx
    entry_route: /
    user_interactions:
      - View the dashboard page with animated widget grid
      - See staggered fade-in animations on page load
      - Hover over the Add Widget button to see scale animation
    api_calls: []
    auth_required: false
  - name: Streak Widget
    description: Displays current learning streak (12 days), level indicator, and XP progress bar with animated fill
    files:
      - src/components/dashboard/widgets/StreakWidget.tsx
      - src/components/ui/GlassCard.tsx
    entry_route: /
    user_interactions:
      - View current streak count (12 days)
      - View level badge (Level 5)
      - See animated XP progress bar filling to 80%
      - Hover to see gradient background opacity change
    api_calls: []
    auth_required: false
  - name: Roadmap Widget
    description: Shows learning roadmap progress for Mastering Python with completed and pending steps
    files:
      - src/components/dashboard/widgets/RoadmapWidget.tsx
      - src/components/ui/GlassCard.tsx
    entry_route: /
    user_interactions:
      - View roadmap title (Mastering Python) and path label (BACKEND PATH)
      - See completed steps with check icons (Intro to Python, Data Structures)
      - See pending steps with circle icons (OOP Concepts, Decorators)
      - Hover over pending steps to see Start button appear
    api_calls: []
    auth_required: false
  - name: Recent Log Widget
    description: Shows the most recent study session with resume capability
    files:
      - src/components/dashboard/widgets/RecentLogWidget.tsx
      - src/components/ui/GlassCard.tsx
    entry_route: /
    user_interactions:
      - View recent study session (FastAPI Basics, Backend Chapter 3)
      - See study time indicator (45m today)
      - Hover to see Resume Session button highlight and play icon turn purple
    api_calls: []
    auth_required: false
  - name: Quick Note Widget
    description: A textarea widget for jotting down quick notes with markdown support indicator
    files:
      - src/components/dashboard/widgets/QuickNoteWidget.tsx
      - src/components/ui/GlassCard.tsx
    entry_route: /
    user_interactions:
      - Click on the textarea to start typing notes
      - Type text into the quick notes area
      - See AI Assist button in the header
      - See markdown supported label at the bottom
    api_calls: []
    auth_required: false
  - name: Sidebar Navigation
    description: Fixed sidebar with navigation links, logo, settings button, and user profile section
    files:
      - src/components/layout/Sidebar.tsx
      - src/components/layout/DashboardLayout.tsx
    entry_route: /
    user_interactions:
      - View logo and Learn Tracker brand name
      - Click Dashboard link to navigate to /
      - Click Roadmaps link to navigate to /roadmaps
      - Click Resources link to navigate to /resources
      - Click Study Logs link to navigate to /logs
      - See active navigation item highlighted with indigo indicator
      - Hover over Settings button to see rotate animation
      - View user profile section (Student, Pro Plan)
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Roadmaps, Resources, and Study Logs pages are not implemented yet
    location: Sidebar navigation links
    impact: Clicking these links will show Next.js 404 page
  - issue: All data is hardcoded (streak count, roadmap steps, study log)
    location: All widget components
    impact: No dynamic data from backend API
  - issue: Quick Notes textarea does not persist data
    location: src/components/dashboard/widgets/QuickNoteWidget.tsx
    impact: Notes are lost on page refresh
  - issue: AI Assist button and Add Widget button have no functionality
    location: QuickNoteWidget.tsx, BentoGrid.tsx
    impact: Buttons are UI-only with no action handlers
